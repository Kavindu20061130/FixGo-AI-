<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - FixGo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        body {
            background: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px 32px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            max-width: 420px;
            width: 100%;
        }
        h1 {
            font-size: 24px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 8px;
        }
        .sub {
            color: #666;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .step {
            display: block;
            margin-bottom: 20px;
        }
        .step.hidden {
            display: none;
        }
        label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
            color: #333;
        }
        input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #d0d7de;
            border-radius: 8px;
            font-size: 15px;
            transition: border 0.2s;
            margin-bottom: 16px;
        }
        input:focus {
            border-color: #E8431A;
            outline: none;
            box-shadow: 0 0 0 3px rgba(232, 67, 26, 0.15);
        }
        button {
            width: 100%;
            padding: 12px;
            background: #E8431A;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #d03a14;
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .message {
            margin: 12px 0;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }
        .message.success {
            display: block;
            background: #e6f7e6;
            color: #1e7e34;
            border: 1px solid #b8e0b8;
        }
        .message.error {
            display: block;
            background: #fde8e8;
            color: #a11f1f;
            border: 1px solid #f5c6c6;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #666;
            font-size: 14px;
            text-decoration: none;
        }
        .back-link:hover {
            color: #E8431A;
        }
        .otp-group {
            display: flex;
            gap: 10px;
        }
        .otp-group input {
            flex: 1;
            margin-bottom: 0;
        }
        .otp-group button {
            width: auto;
            padding: 0 20px;
            white-space: nowrap;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🔐 Reset Password</h1>
        <p class="sub">We'll send a one-time code to your email.</p>

        <!-- Step 1: Request OTP -->
        <div id="step-email" class="step">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="you@example.com" required>
            <button id="send-otp-btn">Send OTP</button>
            <div id="email-message" class="message"></div>
        </div>

        <!-- Step 2: Verify OTP & Reset -->
        <div id="step-otp" class="step hidden">
            <label for="otp">Enter 6-digit OTP</label>
            <div class="otp-group">
                <input type="text" id="otp" placeholder="123456" maxlength="6" inputmode="numeric">
                <button id="verify-otp-btn">Verify</button>
            </div>
            <div id="otp-message" class="message"></div>

            <hr style="margin: 24px 0; border: none; border-top: 1px solid #eee;">

            <label for="new-password">New Password</label>
            <input type="password" id="new-password" placeholder="Min 6 characters">

            <label for="confirm-password">Confirm Password</label>
            <input type="password" id="confirm-password" placeholder="Re-enter password">

            <button id="reset-btn" disabled>Reset Password</button>
            <div id="reset-message" class="message"></div>
        </div>

        <a href="/login" class="back-link">← Back to Sign In</a>
    </div>

    <script>
        // DOM refs
        const stepEmail = document.getElementById('step-email');
        const stepOtp = document.getElementById('step-otp');
        const emailInput = document.getElementById('email');
        const sendBtn = document.getElementById('send-otp-btn');
        const emailMsg = document.getElementById('email-message');

        const otpInput = document.getElementById('otp');
        const verifyBtn = document.getElementById('verify-otp-btn');
        const otpMsg = document.getElementById('otp-message');

        const newPass = document.getElementById('new-password');
        const confirmPass = document.getElementById('confirm-password');
        const resetBtn = document.getElementById('reset-btn');
        const resetMsg = document.getElementById('reset-message');

        let currentEmail = '';

        function showMessage(el, text, type) {
            el.textContent = text;
            el.className = 'message ' + type;
            el.style.display = 'block';
        }

        function hideMessage(el) {
            el.style.display = 'none';
            el.className = 'message';
        }

        // Step 1: Send OTP
        sendBtn.addEventListener('click', async () => {
            const email = emailInput.value.trim().toLowerCase();
            if (!email) {
                showMessage(emailMsg, 'Please enter your email address.', 'error');
                return;
            }
            hideMessage(emailMsg);
            sendBtn.disabled = true;
            sendBtn.textContent = 'Sending...';

            try {
                const res = await fetch('/forgot-password/send-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();
                if (data.success) {
                    currentEmail = email;
                    showMessage(emailMsg, data.message || 'OTP sent to your email.', 'success');
                    // Move to step 2 after a short delay
                    setTimeout(() => {
                        stepEmail.classList.add('hidden');
                        stepOtp.classList.remove('hidden');
                        hideMessage(emailMsg);
                        // Enable reset button only after OTP verified
                        resetBtn.disabled = true;
                    }, 1500);
                } else {
                    showMessage(emailMsg, data.message || 'Something went wrong.', 'error');
                }
            } catch (err) {
                showMessage(emailMsg, 'Network error. Please try again.', 'error');
            } finally {
                sendBtn.disabled = false;
                sendBtn.textContent = 'Send OTP';
            }
        });

        // Step 2: Verify OTP
        verifyBtn.addEventListener('click', async () => {
            const otp = otpInput.value.trim();
            if (!otp || otp.length < 6) {
                showMessage(otpMsg, 'Please enter the 6-digit OTP.', 'error');
                return;
            }
            hideMessage(otpMsg);
            verifyBtn.disabled = true;
            verifyBtn.textContent = 'Verifying...';

            try {
                const res = await fetch('/forgot-password/verify-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: currentEmail, otp })
                });
                const data = await res.json();
                if (data.success) {
                    showMessage(otpMsg, 'OTP verified! You can now reset your password.', 'success');
                    resetBtn.disabled = false;  // Enable reset
                    verifyBtn.disabled = true; // prevent re-verification
                } else {
                    showMessage(otpMsg, data.message || 'Invalid OTP.', 'error');
                }
            } catch (err) {
                showMessage(otpMsg, 'Network error. Please try again.', 'error');
            } finally {
                verifyBtn.textContent = 'Verify';
                if (!resetBtn.disabled) {
                    // only re-enable if not verified
                } else {
                    verifyBtn.disabled = false;
                }
            }
        });

        // Step 3: Reset Password
        resetBtn.addEventListener('click', async () => {
            const p1 = newPass.value.trim();
            const p2 = confirmPass.value.trim();

            if (p1.length < 6) {
                showMessage(resetMsg, 'Password must be at least 6 characters.', 'error');
                return;
            }
            if (p1 !== p2) {
                showMessage(resetMsg, 'Passwords do not match.', 'error');
                return;
            }
            hideMessage(resetMsg);
            resetBtn.disabled = true;
            resetBtn.textContent = 'Resetting...';

            try {
                const res = await fetch('/forgot-password/reset', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: currentEmail,
                        new_password: p1,
                        confirm_password: p2
                    })
                });
                const data = await res.json();
                if (data.success) {
                    showMessage(resetMsg, '✅ Password reset successful! Redirecting to login...', 'success');
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                } else {
                    showMessage(resetMsg, data.message || 'Reset failed.', 'error');
                }
            } catch (err) {
                showMessage(resetMsg, 'Network error. Please try again.', 'error');
            } finally {
                resetBtn.disabled = false;
                resetBtn.textContent = 'Reset Password';
            }
        });

        // Allow Enter key on OTP input
        otpInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') verifyBtn.click();
        });
        emailInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendBtn.click();
        });
    </script>

</body>
</html>
