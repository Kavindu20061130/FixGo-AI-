<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FixGo – Reset Password</title>
  <link rel="icon" type="image/png" href="/asset/images/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/asset/css/login.css" />
  <style>
    :root {
      --brand: #E8431A;
      --brand-dark: #d03a14;
      --navy: #0b1a2b;
      --navy-light: #1f3a4e;
      --border: #d1d5db;
      --text-color: #1a1a1a;
      --text-light: #6b7280;
      --success-bg: #e6f7e6;
      --success-text: #1e7e34;
      --success-border: #b8e0b8;
      --error-bg: #fde8e8;
      --error-text: #a11f1f;
      --error-border: #f5c6c6;
    }
    * { box-sizing: border-box; }
    body { font-family: 'Plus Jakarta Sans', system-ui, -apple-system, sans-serif; }

    .page-wrapper { display: flex; min-height: 100vh; width: 100%; }
    .hero-panel { flex: 1.1; position: relative; overflow: hidden; display: none; }
    .hero-panel .hero-img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      animation: heroZoom 18s ease-in-out infinite alternate;
    }
    @keyframes heroZoom { 0% { transform: scale(1); } 100% { transform: scale(1.06); } }
    .hero-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(180deg, rgba(11,26,43,0) 40%, rgba(11,26,43,0.55) 100%);
    }
    .hero-caption {
      position: absolute; bottom: 48px; left: 48px; right: 48px; color: #fff;
      animation: floatUp 1s ease-out 0.3s both;
    }
    .hero-caption h2 { font-size: 1.6rem; font-weight: 800; margin: 0 0 6px; }
    .hero-caption p { font-size: 0.95rem; opacity: 0.9; margin: 0; }
    @media (min-width: 900px) { .hero-panel { display: block; } }

    .form-panel {
      flex: 1; display: flex; flex-direction: column; justify-content: flex-start;
      align-items: center; padding: 32px 24px 40px; overflow-y: auto; background: #fff;
    }
    .logo-wrap {
      width: 100%; max-width: 420px; display: flex; justify-content: flex-end;
      margin-bottom: 8px; animation: fadeIn 0.7s ease both;
    }
    .logo-wrap .logo { height: 38px; object-fit: contain; }

    .form-container { max-width: min(420px, 100%); width: 100%; margin: 0 auto; }

    .lock-badge {
      width: 64px; height: 64px; border-radius: 18px;
      background: linear-gradient(135deg, var(--brand), #ff7a4d);
      display: flex; align-items: center; justify-content: center;
      margin: 8px auto 18px;
      box-shadow: 0 10px 24px rgba(232,67,26,0.25);
      animation: popIn 0.5s cubic-bezier(.34,1.56,.64,1) both;
    }
    .lock-badge svg { width: 30px; height: 30px; }

    .heading {
      font-size: 1.6rem; font-weight: 800; color: var(--text-color);
      margin: 0 0 4px; text-align: center; animation: floatUp 0.6s ease both;
    }
    .subheading {
      text-align: center; color: var(--text-light); font-size: 0.9rem;
      margin: 0 0 24px; animation: floatUp 0.6s ease 0.05s both;
    }

    .progress-wrap {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-bottom: 26px; animation: floatUp 0.6s ease 0.1s both;
    }
    .progress-dot {
      width: 30px; height: 30px; border-radius: 50%; background: #f0f1f3;
      color: var(--text-light); display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem; font-weight: 700; transition: all 0.35s cubic-bezier(.4,0,.2,1); flex-shrink: 0;
    }
    .progress-dot.active { background: var(--navy); color: #fff; transform: scale(1.08); box-shadow: 0 0 0 4px rgba(11,26,43,0.12); }
    .progress-dot.done { background: var(--brand); color: #fff; }
    .progress-line { width: 32px; height: 2px; background: #e5e7eb; transition: background 0.35s; }
    .progress-line.done { background: var(--brand); }

    .notification {
      margin: 0 0 16px; padding: 12px 14px; border-radius: 10px;
      font-size: 0.88rem; font-weight: 500; animation: slideDown 0.35s ease both;
    }
    .notification.hidden { display: none; }
    .notification.success { background: var(--success-bg); color: var(--success-text); border: 1px solid var(--success-border); }
    .notification.error { background: var(--error-bg); color: var(--error-text); border: 1px solid var(--error-border); }

    .field-group { margin-bottom: 16px; animation: floatUp 0.5s ease both; }
    .field-group label { display: block; font-size: 0.85rem; font-weight: 600; color: var(--text-color); margin-bottom: 6px; }
    .field-group input[type="text"],
    .field-group input[type="email"],
    .field-group input[type="password"] {
      width: 100%; box-sizing: border-box; height: 46px; padding: 0 16px;
      border: 1.5px solid var(--border); border-radius: 12px; font-size: 0.92rem;
      font-family: inherit; background: #fff; color: var(--text-color);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field-group input:focus {
      outline: none; border-color: var(--navy); box-shadow: 0 0 0 4px rgba(11,26,43,0.08);
    }
    .field-group input.input-error { border-color: #dc3545; animation: shake 0.4s ease; }
    .field-group input.input-success { border-color: #1e7e34; }
    .field-error { display: block; min-height: 16px; font-size: 0.76rem; color: #dc3545; margin-top: 5px; animation: fadeIn 0.25s ease both; }
    .hint { font-size: 0.75rem; color: var(--text-light); margin-top: 5px; }

    .otp-group { display: flex; gap: 10px; align-items: flex-start; flex-wrap: nowrap; }
    .otp-group .otp-input { flex: 1; min-width: 0; }
    .otp-group .btn-otp {
      background: var(--navy); color: #fff; border: none; border-radius: 12px; padding: 0 18px;
      font-weight: 600; font-size: 0.85rem; cursor: pointer; transition: background 0.2s, transform 0.15s;
      white-space: nowrap; height: 46px; flex-shrink: 0; min-width: 104px;
    }
    .otp-group .btn-otp:hover:not(:disabled) { background: var(--navy-light); transform: translateY(-1px); }
    .otp-group .btn-otp:disabled { opacity: 0.55; cursor: not-allowed; }
    .otp-group .btn-otp.verified { background: #1e7e34; }
    .otp-pulse { animation: pulseGlow 1.6s ease-in-out infinite; }
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 0 0 rgba(11,26,43,0.0); }
      50% { box-shadow: 0 0 0 6px rgba(11,26,43,0.08); }
    }

    .password-wrap { position: relative; }
    .password-wrap input { padding-right: 44px !important; }
    .toggle-pw {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: var(--text-light);
      display: flex; padding: 0;
    }
    .toggle-pw svg { width: 19px; height: 19px; }

    .strength-bar {
      display: flex; gap: 4px; margin-top: 8px;
    }
    .strength-bar span {
      flex: 1; height: 4px; border-radius: 3px; background: #e5e7eb; transition: background 0.3s;
    }
    .strength-label { font-size: 0.72rem; margin-top: 4px; color: var(--text-light); transition: color 0.3s; }

    .btn-signin {
      width: 100%; padding: 13px; background: var(--brand); color: #fff; border: none;
      border-radius: 12px; font-size: 1rem; font-weight: 700; cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s; margin-top: 4px;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-signin:hover:not(:disabled) {
      background: var(--brand-dark); transform: translateY(-1px); box-shadow: 0 8px 20px rgba(232,67,26,0.28);
    }
    .btn-signin:disabled { opacity: 0.65; cursor: not-allowed; }

    .btn-secondary {
      width: 100%; padding: 13px; background: #fff; color: var(--navy); border: 1.5px solid var(--border);
      border-radius: 12px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: 10px;
    }
    .btn-secondary:hover { border-color: var(--navy); background: #f7f8fa; }

    .spinner {
      width: 16px; height: 16px; border: 2.5px solid rgba(255,255,255,0.4); border-top-color: #fff;
      border-radius: 50%; display: inline-block; animation: spin 0.7s linear infinite;
    }

    .back-link {
      display: block; text-align: center; margin-top: 22px; color: var(--text-light);
      font-size: 0.88rem; text-decoration: none; transition: color 0.2s;
      animation: floatUp 0.6s ease 0.2s both;
    }
    .back-link:hover { color: var(--brand); }

    .success-screen { display: none; text-align: center; animation: floatUp 0.5s ease both; }
    .success-screen.show { display: block; }
    .success-icon {
      width: 86px; height: 86px; margin: 8px auto 18px; border-radius: 50%; background: var(--success-bg);
      display: flex; align-items: center; justify-content: center; animation: popIn 0.5s cubic-bezier(.34,1.56,.64,1) both;
    }
    .success-icon svg { width: 42px; height: 42px; }
    .success-screen h2 { font-size: 1.4rem; font-weight: 800; color: var(--text-color); margin-bottom: 8px; }
    .success-screen p { color: var(--text-light); font-size: 0.92rem; margin-bottom: 4px; }

    .step-panel { display: none; }
    .step-panel.active { display: block; animation: floatUp 0.4s ease both; }

    @keyframes floatUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideDown { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes shake {
      0%, 100% { transform: translateX(0); } 20% { transform: translateX(-5px); }
      40% { transform: translateX(5px); } 60% { transform: translateX(-3px); } 80% { transform: translateX(3px); }
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes popIn { 0% { opacity: 0; transform: scale(0.4); } 100% { opacity: 1; transform: scale(1); } }
    @keyframes checkDraw { to { stroke-dashoffset: 0; } }
  </style>
</head>
<body>

<div class="page-wrapper">

  <!-- LEFT PANEL -->
  <div class="hero-panel">
    <img src="/asset/images/logincover.jpeg" alt="FixGo technician with customer" class="hero-img" />
    <div class="hero-overlay"></div>
    <div class="hero-caption">
      <h2>Forgot something? 🔑</h2>
      <p>No worries — let's get you back into your FixGo account in a couple of steps.</p>
    </div>
  </div>

  <!-- RIGHT PANEL -->
  <div class="form-panel">
    <div class="logo-wrap">
      <img src="/asset/images/logo.png" alt="FixGo Logo" class="logo" />
    </div>

    <div class="form-container">

      <div id="formScreen">

        <div class="lock-badge">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M6 10V8a6 6 0 1112 0v2" stroke="#fff" stroke-width="2" stroke-linecap="round"/>
            <rect x="4" y="10" width="16" height="11" rx="2.5" stroke="#fff" stroke-width="2"/>
            <circle cx="12" cy="15.5" r="1.6" fill="#fff"/>
          </svg>
        </div>

        <h1 class="heading">Reset Your Password</h1>
        <p class="subheading">We'll send a one-time code to your email.</p>

        <div class="progress-wrap">
          <div class="progress-dot active" id="dot1">1</div>
          <div class="progress-line" id="line1"></div>
          <div class="progress-dot" id="dot2">2</div>
          <div class="progress-line" id="line2"></div>
          <div class="progress-dot" id="dot3">3</div>
        </div>

        <div id="notification" class="notification hidden"></div>

        <!-- ===== STEP 1: Email ===== -->
        <div class="step-panel active" id="step1">
          <div class="field-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="you@example.com" required autocomplete="email" />
            <span class="field-error" id="emailError"></span>
          </div>
          <button type="button" class="btn-signin" id="sendOtpBtn">Send OTP</button>
        </div>

        <!-- ===== STEP 2: OTP ===== -->
        <div class="step-panel" id="step2">
          <div class="field-group">
            <label for="otp">Enter 6-digit Code</label>
            <div class="otp-group">
              <input type="text" id="otp" placeholder="123456" maxlength="6" inputmode="numeric" class="otp-input" />
              <button type="button" class="btn-otp" id="verifyOtpBtn">Verify</button>
            </div>
            <span class="field-error" id="otpError"></span>
            <div class="hint" id="otpTimerHint">Code sent — check your inbox.</div>
          </div>
          <button type="button" class="btn-secondary" id="resendBtn" disabled>Resend Code</button>
        </div>

        <!-- ===== STEP 3: New password ===== -->
        <div class="step-panel" id="step3">
          <div class="field-group">
            <label for="new-password">New Password</label>
            <div class="password-wrap">
              <input type="password" id="new-password" placeholder="Min. 6 characters" />
              <button type="button" class="toggle-pw" data-target="new-password" aria-label="Show password">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <div class="strength-bar"><span></span><span></span><span></span><span></span></div>
            <div class="strength-label" id="strengthLabel">&nbsp;</div>
            <span class="field-error" id="newPasswordError"></span>
          </div>

          <div class="field-group">
            <label for="confirm-password">Confirm Password</label>
            <div class="password-wrap">
              <input type="password" id="confirm-password" placeholder="Re-enter password" />
              <button type="button" class="toggle-pw" data-target="confirm-password" aria-label="Show password">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7-11-7-11-7z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <span class="field-error" id="confirmPasswordError"></span>
          </div>

          <button type="button" class="btn-signin" id="resetBtn">Reset Password</button>
        </div>

        <a href="/login" class="back-link">← Back to Sign In</a>
      </div>

      <!-- ===== Success screen ===== -->
      <div class="success-screen" id="successScreen">
        <div class="success-icon">
          <svg viewBox="0 0 52 52" fill="none">
            <circle cx="26" cy="26" r="25" stroke="#1e7e34" stroke-width="2" opacity="0.25"/>
            <path d="M14 27l8 8 16-17" stroke="#1e7e34" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"
              stroke-dasharray="40" stroke-dashoffset="40" style="animation: checkDraw 0.5s ease 0.2s forwards;"/>
          </svg>
        </div>
        <h2 id="successHeading">Password Reset!</h2>
        <p id="successMessage">Password has been reset successfully. Please log in.</p>
      </div>

    </div>
  </div>
</div>

<script>
(function () {
  "use strict";

  const notif = document.getElementById("notification");
  const formScreen = document.getElementById("formScreen");
  const successScreen = document.getElementById("successScreen");

  const step1 = document.getElementById("step1");
  const step2 = document.getElementById("step2");
  const step3 = document.getElementById("step3");
  const dot1 = document.getElementById("dot1");
  const dot2 = document.getElementById("dot2");
  const dot3 = document.getElementById("dot3");
  const line1 = document.getElementById("line1");
  const line2 = document.getElementById("line2");

  const emailInput = document.getElementById("email");
  const sendOtpBtn  = document.getElementById("sendOtpBtn");

  const otpInput     = document.getElementById("otp");
  const verifyOtpBtn = document.getElementById("verifyOtpBtn");
  const resendBtn    = document.getElementById("resendBtn");
  const otpTimerHint = document.getElementById("otpTimerHint");

  const newPass = document.getElementById("new-password");
  const confirmPass = document.getElementById("confirm-password");
  const resetBtn = document.getElementById("resetBtn");
  const strengthLabel = document.getElementById("strengthLabel");
  const strengthBars = document.querySelectorAll(".strength-bar span");

  let currentEmail = "";
  let otpTimer = null;
  let countdown = 0;

  function showNotif(msg, type) {
    notif.textContent = msg;
    notif.className = `notification ${type}`;
  }
  function hideNotif() { notif.className = "notification hidden"; }

  function setErr(inputId, errId, msg) {
    const el = document.getElementById(inputId);
    const er = document.getElementById(errId);
    if (el) el.classList.add("input-error");
    if (er) er.textContent = msg;
  }
  function clearErr(inputId, errId) {
    const el = document.getElementById(inputId);
    const er = document.getElementById(errId);
    if (el) el.classList.remove("input-error");
    if (er) er.textContent = "";
  }
  function isValidEmail(e) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }

  function goToStep(n) {
    [step1, step2, step3].forEach(s => s.classList.remove("active"));
    [dot1, dot2, dot3].forEach(d => d.classList.remove("active"));
    if (n === 1) { step1.classList.add("active"); dot1.classList.add("active"); }
    if (n === 2) {
      step2.classList.add("active"); dot2.classList.add("active");
      dot1.classList.add("done"); dot1.textContent = "✓"; line1.classList.add("done");
    }
    if (n === 3) {
      step3.classList.add("active"); dot3.classList.add("active");
      dot1.classList.add("done"); dot1.textContent = "✓"; line1.classList.add("done");
      dot2.classList.add("done"); dot2.textContent = "✓"; line2.classList.add("done");
    }
    hideNotif();
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function startResendTimer(seconds = 60) {
    if (otpTimer) clearInterval(otpTimer);
    countdown = seconds;
    resendBtn.disabled = true;
    resendBtn.textContent = `Resend Code (${countdown}s)`;
    otpTimer = setInterval(() => {
      countdown--;
      if (countdown <= 0) {
        clearInterval(otpTimer);
        otpTimer = null;
        resendBtn.disabled = false;
        resendBtn.textContent = "Resend Code";
      } else {
        resendBtn.textContent = `Resend Code (${countdown}s)`;
      }
    }, 1000);
  }

  // ===== Step 1: Send OTP =====
  async function sendOtp() {
    const email = emailInput.value.trim().toLowerCase();
    if (!email) { setErr("email","emailError","Please enter your email address."); return; }
    if (!isValidEmail(email)) { setErr("email","emailError","Enter a valid email address."); return; }
    clearErr("email","emailError");
    hideNotif();

    sendOtpBtn.disabled = true;
    sendOtpBtn.innerHTML = '<span class="spinner"></span> Sending…';

    try {
      const res = await fetch("/forgot-password/send-otp", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email })
      });
      const data = await res.json();
      if (data.success) {
        currentEmail = email;
        showNotif(data.message || "OTP sent to your email.", "success");
        otpInput.value = "";
        otpTimerHint.textContent = `Code sent to ${email}`;
        startResendTimer(60);
        setTimeout(() => goToStep(2), 900);
      } else {
        showNotif(data.message || "Something went wrong.", "error");
      }
    } catch (err) {
      showNotif("Network error. Please try again.", "error");
    } finally {
      sendOtpBtn.disabled = false;
      sendOtpBtn.textContent = "Send OTP";
    }
  }
  sendOtpBtn.addEventListener("click", sendOtp);
  emailInput.addEventListener("keydown", (e) => { if (e.key === "Enter") sendOtp(); });
  emailInput.addEventListener("input", function () { if (this.value.trim()) clearErr("email","emailError"); });

  resendBtn.addEventListener("click", sendOtp);

  // ===== Step 2: Verify OTP =====
  async function verifyOtp() {
    const otp = otpInput.value.trim();
    if (!otp || otp.length < 6) { setErr("otp","otpError","Please enter the 6-digit code."); return; }
    clearErr("otp","otpError");

    verifyOtpBtn.disabled = true;
    verifyOtpBtn.textContent = "Verifying...";

    try {
      const res = await fetch("/forgot-password/verify-otp", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: currentEmail, otp })
      });
      const data = await res.json();
      if (data.success) {
        showNotif("Code verified! Choose your new password.", "success");
        if (otpTimer) clearInterval(otpTimer);
        setTimeout(() => goToStep(3), 700);
      } else {
        setErr("otp","otpError", data.message || "Invalid code.");
        verifyOtpBtn.textContent = "Verify";
        verifyOtpBtn.disabled = false;
      }
    } catch (err) {
      showNotif("Network error. Please try again.", "error");
      verifyOtpBtn.textContent = "Verify";
      verifyOtpBtn.disabled = false;
    }
  }
  verifyOtpBtn.addEventListener("click", verifyOtp);
  otpInput.addEventListener("input", function () {
    this.value = this.value.replace(/\D/g, "");
    if (this.value.trim()) clearErr("otp","otpError");
  });
  otpInput.addEventListener("keydown", (e) => { if (e.key === "Enter") verifyOtp(); });

  // ===== Password visibility toggle =====
  document.querySelectorAll(".toggle-pw").forEach(btn => {
    btn.addEventListener("click", function () {
      const input = document.getElementById(this.dataset.target);
      input.type = input.type === "password" ? "text" : "password";
    });
  });

  // ===== Password strength meter =====
  newPass.addEventListener("input", function () {
    const val = this.value;
    let score = 0;
    if (val.length >= 6) score++;
    if (val.length >= 10) score++;
    if (/[A-Z]/.test(val) && /[a-z]/.test(val)) score++;
    if (/\d/.test(val) && /[^A-Za-z0-9]/.test(val)) score++;

    const colors = ["#e5e7eb", "#dc3545", "#f0a020", "#2f9e44", "#1e7e34"];
    const labels = ["", "Weak", "Fair", "Good", "Strong"];

    strengthBars.forEach((bar, i) => {
      bar.style.background = i < score ? colors[score] : "#e5e7eb";
    });
    strengthLabel.textContent = val ? labels[score] : "\u00A0";
    strengthLabel.style.color = score ? colors[score] : "var(--text-light)";

    if (val) clearErr("new-password","newPasswordError");
  });

  confirmPass.addEventListener("input", function () {
    if (this.value === newPass.value) clearErr("confirm-password","confirmPasswordError");
  });

  // ===== Step 3: Reset password =====
  resetBtn.addEventListener("click", async function () {
    const p1 = newPass.value.trim();
    const p2 = confirmPass.value.trim();

    let valid = true;
    if (p1.length < 6) { setErr("new-password","newPasswordError","Password must be at least 6 characters."); valid = false; }
    else clearErr("new-password","newPasswordError");

    if (p1 !== p2) { setErr("confirm-password","confirmPasswordError","Passwords do not match."); valid = false; }
    else clearErr("confirm-password","confirmPasswordError");

    if (!valid) return;
    hideNotif();

    resetBtn.disabled = true;
    resetBtn.innerHTML = '<span class="spinner"></span> Resetting…';

    try {
      const res = await fetch("/forgot-password/reset", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: currentEmail, new_password: p1, confirm_password: p2 })
      });
      const data = await res.json();
      if (data.success) {
        formScreen.style.display = "none";
        const successMsgEl = document.getElementById("successMessage");
        if (successMsgEl) successMsgEl.textContent = data.message || "Password has been reset successfully. Please log in.";
        successScreen.classList.add("show");
        setTimeout(() => { window.location.href = "/login"; }, 1800);
      } else {
        showNotif(data.message || "Reset failed. Please try again.", "error");
        resetBtn.disabled = false;
        resetBtn.textContent = "Reset Password";
      }
    } catch (err) {
      showNotif("Network error. Please try again.", "error");
      resetBtn.disabled = false;
      resetBtn.textContent = "Reset Password";
    }
  });

})();
</script>
</body>
</html>
