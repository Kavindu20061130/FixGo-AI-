<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FixGo – Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../asset/css/login.css" />
</head>

<body>

  <div class="page-wrapper">

    <!-- LEFT PANEL: Hero image -->
    <div class="hero-panel">
      <img src="../asset/images/logincover.jpeg" alt="FixGo technician with customer" class="hero-img" />
    </div>

    <!-- RIGHT PANEL: Login form -->
    <div class="form-panel">

      <!-- Logo (top right) -->
      <div class="logo-wrap">
        <img src="../asset/images/logo.png" alt="FixGo Logo" class="logo" />
      </div>

      <!-- Main Centered Form Container -->
      <div class="form-container">
        <h1 class="heading">WELCOME BACK</h1>
        <p class="subheading">Welcome back! Please enter your details.</p>

        <!-- Notification banner -->
        <div id="notification" class="notification hidden"></div>

        <!-- Login Form -->
        <form id="loginForm" novalidate>

          <div class="field-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" autocomplete="email" required />
            <span class="field-error" id="emailError"></span>
          </div>

          <div class="field-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="**********"
              autocomplete="current-password" required />
            <span class="field-error" id="passwordError"></span>
          </div>

          <div class="options-row">
            <label class="remember-label">
              <input type="checkbox" id="remember" name="remember" />
              <span class="custom-check"></span>
              Remember me
            </label>
            <a href="/forgot-password" class="forgot-link">Forgot password</a>
          </div>

          <button type="submit" class="btn-signin" id="signinBtn">
            Sign In
          </button>

        </form>

        <!-- Google Sign-In -->
        <a href="/google" class="btn-google">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 48 48">
            <path fill="#EA4335"
              d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
            <path fill="#4285F4"
              d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
            <path fill="#FBBC05"
              d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
            <path fill="#34A853"
              d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
            <path fill="none" d="M0 0h48v48H0z" />
          </svg>
          Sign in with Google
        </a>

        <p class="signup-text">
          Don't have an account?
          <a href="/register" class="signup-link">Sign up fo free!</a>
        </p>
      </div>

    </div>
  </div>

  <script src="../asset/js/login.js"></script>
</body>

</html>
