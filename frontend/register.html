<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FixGo – Create Account</title>
  <link rel="icon" type="image/png" href="/asset/images/logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/asset/css/login.css" />
  <style>
    /* Register-specific overrides – keeps same brand/design */
    .form-panel { overflow-y: auto; justify-content: flex-start; padding-top: 32px; padding-bottom: 32px; }
    .field-group { margin-bottom: 12px; }
    .field-group:nth-of-type(n) { animation-delay: 0s; }  /* reset stagger */
    .form-container { max-width: min(460px, 100%); }
    .divider { display:flex;align-items:center;gap:12px;margin:10px 0; }
    .divider::before,.divider::after { content:'';flex:1;border-top:1px solid var(--border); }
    .divider span { font-size:.78rem;color:var(--text-light); }

    /* OTP field group – beautifully integrated, no UI changes to the rest */
    .otp-group {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: nowrap;
      margin-top: 2px;
    }
    .otp-group .otp-input {
      flex: 1;
      min-width: 0;
      width: 100%;
      box-sizing: border-box;
    }
    .otp-group .btn-otp {
      background: #1e2b3c;
      color: white;
      border: none;
      border-radius: 30px;
      padding: 0 18px;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: 0.2s;
      white-space: nowrap;
      letter-spacing: 0.3px;
      height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #0b1a2b;
      flex-shrink: 0;
      width: auto;
      min-width: 100px;
    }
    .otp-group .btn-otp:hover {
      background: #1f3a4e;
    }
    .otp-group .btn-otp:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .otp-timer {
      font-size: 0.8rem;
      color: var(--text-light);
      margin-left: 4px;
    }
    .field-group .hint {
      font-size: 0.75rem;
      color: var(--text-light);
      margin-top: 4px;
    }

    /* Ensure all input fields have consistent sizing */
    .field-group input[type="text"],
    .field-group input[type="email"],
    .field-group input[type="password"],
    .field-group input[type="tel"],
    .field-group select {
      width: 100%;
      box-sizing: border-box;
      height: 44px;
      padding: 0 16px;
      border: 1px solid var(--border, #d1d5db);
      border-radius: 30px;
      font-size: 0.9rem;
      background: white;
      transition: border-color 0.2s;
      appearance: auto;
    }
    .field-group input:focus,
    .field-group select:focus {
      outline: none;
      border-color: #0b1a2b;
    }
    .field-group input.input-error,
    .field-group select.input-error {
      border-color: #dc3545;
    }

    /* Terms & Conditions checkbox */
    .terms-group {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin: 8px 0 4px 0;
    }
    .terms-group input[type="checkbox"] {
      width: 18px;
      height: 18px;
      margin-top: 2px;
      flex-shrink: 0;
      accent-color: #0b1a2b;
      cursor: pointer;
    }
    .terms-group label {
      font-size: 0.85rem;
      color: var(--text-color, #333);
      cursor: pointer;
      line-height: 1.4;
    }
    .terms-group label a {
      color: #0b1a2b;
      font-weight: 600;
      text-decoration: underline;
    }
    .terms-group label a:hover {
      color: #1f3a4e;
    }
    .field-error {
      display: block;
      margin-top: 4px;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .otp-group {
        flex-wrap: wrap;
      }
      .otp-group .btn-otp {
        width: 100%;
        min-width: unset;
      }
    }
  </style>
</head>
<body>
<div class="page-wrapper">

  <!-- LEFT PANEL -->
  <div class="hero-panel">
    <img src="/asset/images/logincover.jpeg" alt="FixGo technician" class="hero-img" />
  </div>

  <!-- RIGHT PANEL -->
  <div class="form-panel">
    <div class="logo-wrap">
      <img src="/asset/images/logo.png" alt="FixGo Logo" class="logo" />
    </div>

    <div class="form-container">
      <h1 class="heading">CREATE ACCOUNT</h1>
      <p class="subheading">Fill in your details to get started.</p>

      <!-- Notification -->
      <div id="notification" class="notification hidden"></div>

      <!-- Sign up with Google -->
      <a href="/google" class="btn-google" style="margin-bottom:10px;">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 48 48">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Sign up with Google
      </a>

      <div class="divider"><span>or register with email</span></div>

      <form id="registerForm" novalidate>

        <div class="field-group">
          <label for="full_name">Full Name <span style="color:#dc3545;">*</span></label>
          <input type="text" id="full_name" placeholder="John Doe" required />
          <span class="field-error" id="nameError"></span>
        </div>

        <div class="field-group">
          <label for="email">Email <span style="color:#dc3545;">*</span></label>
          <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required />
          <span class="field-error" id="emailError"></span>
        </div>

        <div class="field-group">
          <label for="password">Password <span style="color:#dc3545;">*</span></label>
          <input type="password" id="password" placeholder="Min. 6 characters" required />
          <span class="field-error" id="passwordError"></span>
        </div>

        <div class="field-group">
          <label for="confirm_password">Confirm Password <span style="color:#dc3545;">*</span></label>
          <input type="password" id="confirm_password" placeholder="Re-enter password" required />
          <span class="field-error" id="confirmError"></span>
        </div>

        <!-- Phone + OTP section: phone is MANDATORY -->
        <div class="field-group">
          <label for="phone">Primary Phone <span style="color:#dc3545;">*</span></label>
          <div class="otp-group">
            <input type="tel" id="phone" placeholder="+94771234567 or 0771234567" class="otp-input" required />
            <button type="button" class="btn-otp" id="sendOtpBtn">Send OTP</button>
          </div>
          <span class="field-error" id="phoneError"></span>
          <div class="hint" id="otpHint">Enter phone number to receive OTP via SMS</div>
        </div>

        <!-- OTP verification field (mandatory) -->
        <div class="field-group" id="otpFieldGroup" style="display:none;">
          <label for="otp_code">OTP Code <span style="color:#dc3545;">*</span></label>
          <div class="otp-group">
            <input type="text" id="otp_code" placeholder="Enter 6-digit OTP" class="otp-input" inputmode="numeric" maxlength="6" />
            <button type="button" class="btn-otp" id="verifyOtpBtn" disabled>Verify</button>
          </div>
          <span class="field-error" id="otpError"></span>
          <div class="hint" id="otpTimerHint"></div>
        </div>

        <!-- Secondary Phone (Optional) -->
        <div class="field-group">
          <label for="secondary_phone">Secondary Phone <span style="font-weight:400;color:var(--text-light)">(optional)</span></label>
          <input type="tel" id="secondary_phone" placeholder="+94771234567 or 0771234567" />
          <span class="field-error" id="secondaryPhoneError"></span>
        </div>

        <div class="field-group">
          <label for="nic">NIC Number <span style="color:#dc3545;">*</span></label>
          <input type="text" id="nic" placeholder="e.g. 199012345678" required />
          <span class="field-error" id="nicError"></span>
        </div>

        <div class="field-group">
          <label for="address">Address <span style="color:#dc3545;">*</span></label>
          <input type="text" id="address" placeholder="No. 12, Main Street" required />
          <span class="field-error" id="addressError"></span>
        </div>

        <!-- City (Mandatory) -->
        <div class="field-group">
          <label for="city">City <span style="color:#dc3545;">*</span></label>
          <input type="text" id="city" placeholder="e.g. Colombo, Kandy, Galle" required />
          <span class="field-error" id="cityError"></span>
        </div>

        <!-- Province (Sri Lankan only) -->
        <div class="field-group">
          <label for="province">Province <span style="color:#dc3545;">*</span></label>
          <select id="province" required>
            <option value="">Select your province</option>
            <option value="Central">Central Province</option>
            <option value="Eastern">Eastern Province</option>
            <option value="North Central">North Central Province</option>
            <option value="Northern">Northern Province</option>
            <option value="North Western">North Western Province</option>
            <option value="Sabaragamuwa">Sabaragamuwa Province</option>
            <option value="Southern">Southern Province</option>
            <option value="Uva">Uva Province</option>
            <option value="Western">Western Province</option>
          </select>
          <span class="field-error" id="provinceError"></span>
        </div>

        <!-- Terms & Conditions -->
        <div class="terms-group">
          <input type="checkbox" id="terms" required />
          <label for="terms">
            I agree to the <a href="/terms" target="_blank">Terms & Conditions</a> and 
            <a href="/privacy" target="_blank">Privacy Policy</a> <span style="color:#dc3545;">*</span>
          </label>
        </div>
        <span class="field-error" id="termsError"></span>

        <button type="submit" class="btn-signin" id="registerBtn">Create Account</button>

      </form>

      <p class="signup-text" style="margin-top:8px;">
        Already have an account? <a href="/login" class="signup-link">Sign in</a>
      </p>
    </div>
  </div>
</div>

<script>
(function () {
  "use strict";

  const form        = document.getElementById("registerForm");
  const btn         = document.getElementById("registerBtn");
  const notif       = document.getElementById("notification");
  const btnDefault  = btn.innerHTML;
  const spinner     = '<span class="spinner"></span> Creating account…';

  // OTP elements
  const phoneInput   = document.getElementById("phone");
  const sendOtpBtn   = document.getElementById("sendOtpBtn");
  const otpFieldGroup= document.getElementById("otpFieldGroup");
  const otpInput     = document.getElementById("otp_code");
  const verifyOtpBtn = document.getElementById("verifyOtpBtn");
  const otpError     = document.getElementById("otpError");
  const otpHint      = document.getElementById("otpHint");
  const otpTimerHint = document.getElementById("otpTimerHint");

  // Other elements
  const secondaryPhone = document.getElementById("secondary_phone");
  const provinceSelect = document.getElementById("province");
  const termsCheckbox  = document.getElementById("terms");
  const cityInput      = document.getElementById("city");

  // state
  let otpSent = false;
  let otpVerified = false;
  let otpTimer = null;
  let countdown = 0;

  function showNotif(msg, type) {
    notif.textContent = msg;
    notif.className = `notification ${type}`;
  }
  function hideNotif() { notif.className = "notification hidden"; }

  function setErr(inputId, errId, msg) {
    const el = document.getElementById(inputId);
    const er = document.getElementById(errId);
    if (el) el.classList.add("input-error");
    if (er) er.textContent = msg;
  }
  function clearErr(inputId, errId) {
    const el = document.getElementById(inputId);
    const er = document.getElementById(errId);
    if (el) el.classList.remove("input-error");
    if (er) er.textContent = "";
  }
  function setLoading(v) {
    btn.disabled  = v;
    btn.innerHTML = v ? spinner : btnDefault;
  }

  function isValidEmail(e) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e); }
  function isValidPhone(p) {
    if (!p) return false;
    return /^(07\d{8}|\+[1-9]\d{6,14})$/.test(p.trim());
  }

  function startOtpTimer(seconds = 60) {
    if (otpTimer) clearInterval(otpTimer);
    countdown = seconds;
    sendOtpBtn.disabled = true;
    otpTimerHint.textContent = `Resend in ${countdown}s`;
    otpTimer = setInterval(() => {
      countdown--;
      if (countdown <= 0) {
        clearInterval(otpTimer);
        otpTimer = null;
        sendOtpBtn.disabled = false;
        otpTimerHint.textContent = 'OTP expired. Send again.';
        if (!otpVerified) {
          otpSent = false;
          otpInput.value = '';
          verifyOtpBtn.disabled = true;
        }
      } else {
        otpTimerHint.textContent = `Resend in ${countdown}s`;
      }
    }, 1000);
  }

  // Send OTP via SMS using Text.lk
  sendOtpBtn.addEventListener("click", async function () {
    const phone = phoneInput.value.trim();
    if (!phone) {
      setErr("phone","phoneError","Phone number is required.");
      return;
    }
    if (!isValidPhone(phone)) {
      setErr("phone","phoneError","Please enter a valid phone number.");
      return;
    }
    clearErr("phone","phoneError");

    sendOtpBtn.disabled = true;
    sendOtpBtn.textContent = "Sending...";
    try {
      const response = await fetch("/send-otp", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ phone: phone })
      });
      const data = await response.json();

      if (data.success) {
        otpSent = true;
        otpVerified = false;
        otpInput.value = '';
        verifyOtpBtn.disabled = true;
        otpFieldGroup.style.display = 'block';
        otpHint.textContent = `OTP sent to ${phone} via SMS`;
        showNotif("OTP sent to your phone via SMS.", "success");
        startOtpTimer(60);
        otpInput.focus();
      } else {
        showNotif(data.message || "Failed to send OTP. Please try again.", "error");
        sendOtpBtn.disabled = false;
        sendOtpBtn.textContent = "Send OTP";
      }
    } catch (err) {
      showNotif("Network error. Please check your connection.", "error");
      sendOtpBtn.disabled = false;
      sendOtpBtn.textContent = "Send OTP";
    } finally {
      // Only re-enable if not already in timer
      if (!otpSent) {
        sendOtpBtn.disabled = false;
        sendOtpBtn.textContent = "Send OTP";
      }
    }
  });

  // Verify OTP
  verifyOtpBtn.addEventListener("click", async function () {
    const phone = phoneInput.value.trim();
    const code = otpInput.value.trim();
    
    if (!code) {
      setErr("otp_code","otpError","Please enter the OTP code.");
      return;
    }
    if (code.length < 6) {
      setErr("otp_code","otpError","OTP must be 6 digits.");
      return;
    }
    clearErr("otp_code","otpError");

    verifyOtpBtn.disabled = true;
    verifyOtpBtn.textContent = "Verifying...";
    try {
      const response = await fetch("/verify-otp", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ phone: phone, otp: code })
      });
      const data = await response.json();

      if (data.success) {
        otpVerified = true;
        otpSent = true;
        if (otpTimer) clearInterval(otpTimer);
        otpTimerHint.textContent = '✓ OTP verified';
        verifyOtpBtn.textContent = '✓ Verified';
        verifyOtpBtn.disabled = true;
        otpInput.disabled = true;
        showNotif("Phone number verified successfully.", "success");
      } else {
        setErr("otp_code","otpError",data.message || "Invalid OTP. Please try again.");
        verifyOtpBtn.textContent = "Verify";
        verifyOtpBtn.disabled = false;
      }
    } catch (err) {
      showNotif("Network error. Please check your connection.", "error");
      verifyOtpBtn.textContent = "Verify";
      verifyOtpBtn.disabled = false;
    }
  });

  otpInput.addEventListener("input", function () {
    const val = this.value.trim();
    if (val.length >= 6 && otpSent && !otpVerified) {
      verifyOtpBtn.disabled = false;
    } else {
      verifyOtpBtn.disabled = true;
    }
  });

  // Phone validation
  phoneInput.addEventListener("blur", function () {
    const v = this.value.trim();
    if (v && !isValidPhone(v)) {
      setErr("phone","phoneError","Use 07XXXXXXXX or +94XXXXXXXXX format.");
    } else if (!v) {
      setErr("phone","phoneError","Phone number is required.");
    } else {
      clearErr("phone","phoneError");
    }
  });
  phoneInput.addEventListener("input", function () {
    if (this.value.trim() && isValidPhone(this.value.trim())) {
      clearErr("phone","phoneError");
    }
  });

  // Secondary phone validation (optional)
  secondaryPhone.addEventListener("blur", function () {
    const v = this.value.trim();
    if (v && !isValidPhone(v)) {
      setErr("secondary_phone","secondaryPhoneError","Use 07XXXXXXXX or +94XXXXXXXXX format.");
    } else {
      clearErr("secondary_phone","secondaryPhoneError");
    }
  });
  secondaryPhone.addEventListener("input", function () {
    if (!this.value.trim() || isValidPhone(this.value.trim())) {
      clearErr("secondary_phone","secondaryPhoneError");
    }
  });

  // Email validation
  document.getElementById("email").addEventListener("blur", function () {
    const v = this.value.trim();
    if (!v) setErr("email","emailError","Email is required.");
    else if (!isValidEmail(v)) setErr("email","emailError","Enter a valid email address.");
    else clearErr("email","emailError");
  });
  document.getElementById("email").addEventListener("input", function () {
    if (this.value.trim()) clearErr("email","emailError");
  });

  // Confirm password validation
  document.getElementById("confirm_password").addEventListener("blur", function () {
    const pw = document.getElementById("password").value;
    if (this.value && this.value !== pw) {
      setErr("confirm_password","confirmError","Passwords do not match.");
    } else {
      clearErr("confirm_password","confirmError");
    }
  });
  document.getElementById("confirm_password").addEventListener("input", function () {
    const pw = document.getElementById("password").value;
    if (this.value === pw) clearErr("confirm_password","confirmError");
  });

  // City validation
  cityInput.addEventListener("blur", function () {
    const v = this.value.trim();
    if (!v) {
      setErr("city","cityError","City is required.");
    } else {
      clearErr("city","cityError");
    }
  });
  cityInput.addEventListener("input", function () {
    if (this.value.trim()) clearErr("city","cityError");
  });

  // Province validation
  provinceSelect.addEventListener("blur", function () {
    if (!this.value) {
      setErr("province","provinceError","Please select your province.");
    } else {
      clearErr("province","provinceError");
    }
  });
  provinceSelect.addEventListener("change", function () {
    if (this.value) clearErr("province","provinceError");
  });

  // Terms checkbox validation
  termsCheckbox.addEventListener("change", function () {
    if (this.checked) {
      clearErr("terms","termsError");
    }
  });

  // Submit - OTP mandatory check
  form.addEventListener("submit", async function (e) {
    e.preventDefault();
    hideNotif();

    // Check terms first
    if (!termsCheckbox.checked) {
      setErr("terms","termsError","You must agree to the Terms & Conditions.");
      termsCheckbox.focus();
      return;
    } else {
      clearErr("terms","termsError");
    }

    if (!otpVerified) {
      showNotif("Please verify your phone number with OTP first.", "error");
      otpFieldGroup.style.display = 'block';
      otpInput.focus();
      return;
    }

    const full_name        = document.getElementById("full_name").value.trim();
    const email            = document.getElementById("email").value.trim();
    const password         = document.getElementById("password").value;
    const confirm_password = document.getElementById("confirm_password").value;
    const phone            = phoneInput.value.trim();
    const secondary_phone  = secondaryPhone.value.trim();
    const nic              = document.getElementById("nic").value.trim();
    const address          = document.getElementById("address").value.trim();
    const city             = cityInput.value.trim();
    const province         = provinceSelect.value;

    let valid = true;

    if (!full_name) { setErr("full_name","nameError","Full name is required."); valid=false; }
    else clearErr("full_name","nameError");

    if (!email) { setErr("email","emailError","Email is required."); valid=false; }
    else if (!isValidEmail(email)) { setErr("email","emailError","Enter a valid email address."); valid=false; }
    else clearErr("email","emailError");

    if (!password) { setErr("password","passwordError","Password is required."); valid=false; }
    else if (password.length < 6) { setErr("password","passwordError","Password must be at least 6 characters."); valid=false; }
    else clearErr("password","passwordError");

    if (!confirm_password) { setErr("confirm_password","confirmError","Please confirm your password."); valid=false; }
    else if (password !== confirm_password) { setErr("confirm_password","confirmError","Passwords do not match."); valid=false; }
    else clearErr("confirm_password","confirmError");

    if (!phone) { setErr("phone","phoneError","Phone number is required."); valid=false; }
    else if (!isValidPhone(phone)) { setErr("phone","phoneError","Enter a valid phone number."); valid=false; }
    else clearErr("phone","phoneError");

    if (secondary_phone && !isValidPhone(secondary_phone)) {
      setErr("secondary_phone","secondaryPhoneError","Enter a valid secondary phone number.");
      valid=false;
    } else {
      clearErr("secondary_phone","secondaryPhoneError");
    }

    if (!nic) { setErr("nic","nicError","NIC number is required."); valid=false; }
    else clearErr("nic","nicError");

    if (!address) { setErr("address","addressError","Address is required."); valid=false; }
    else clearErr("address","addressError");

    if (!city) { setErr("city","cityError","City is required."); valid=false; }
    else clearErr("city","cityError");

    if (!province) { setErr("province","provinceError","Please select your province."); valid=false; }
    else clearErr("province","provinceError");

    if (!termsCheckbox.checked) {
      setErr("terms","termsError","You must agree to the Terms & Conditions.");
      valid=false;
    } else {
      clearErr("terms","termsError");
    }

    if (!valid) return;

    setLoading(true);
    try {
      const res  = await fetch("/register", {
        method:  "POST",
        headers: { "Content-Type": "application/json" },
        body:    JSON.stringify({ 
          full_name, email, password, confirm_password, 
          phone, secondary_phone, nic, address, city, province, 
          otpVerified, terms: termsCheckbox.checked 
        }),
        credentials: "include"
      });
      const data = await res.json();

      if (res.ok && data.success) {
        showNotif("Account created! Redirecting to sign in…", "success");
        setTimeout(() => { window.location.href = "/login"; }, 1200);
      } else {
        showNotif(data.message || "Registration failed. Please try again.", "error");
        if (data.field) {
          const errMap = {
            email:            "emailError",
            confirm_password: "confirmError",
            phone:            "phoneError",
            secondary_phone:  "secondaryPhoneError"
          };
          if (errMap[data.field]) setErr(data.field, errMap[data.field], data.message);
        }
      }
    } catch (err) {
      showNotif("Network error. Please check your connection.", "error");
    } finally {
      setLoading(false);
    }
  });
})();
</script>
</body>
</html>
